services:
  - type: web
    name: vikiclow
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: VIKICLOW_STATE_DIR
        value: /data/.vikiclow
      - key: VIKICLOW_WORKSPACE_DIR
        value: /data/workspace
      - key: VIKICLOW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: vikiclow-data
      mountPath: /data
      sizeGB: 1
